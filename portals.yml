# Portal Scanner Configuration — Estefanía Rincón
# Targeting design, marketing, branding, and endomarketing roles in Mexico.

title_filter:
  positive:
    # -- Marketing/Branding (Spanish) --
    - "Marketing"
    - "Mercadotecnia"
    - "Branding"
    - "Marca"
    - "Comunicación"
    - "Contenido"
    - "Endomarketing"
    - "Diseño"
    - "Creativo"
    - "Creativa"
    - "Community Manager"
    - "Social Media"
    - "Redes Sociales"
    - "Digital"
    # -- Marketing/Branding (English) --
    - "Brand Manager"
    - "Marketing Manager"
    - "Marketing Coordinator"
    - "Content Strategist"
    - "Content Strategy"
    - "Creative Director"
    - "Art Director"
    - "Graphic Design"
    - "Visual Design"
    - "Internal Communications"
    - "Employer Branding"
    - "Packaging Design"
  negative:
    # -- Exclude tech/engineering roles --
    - "Software Engineer"
    - "Developer"
    - "Backend"
    - "Frontend"
    - "DevOps"
    - "Data Engineer"
    - "Machine Learning"
    - "Becario"
    - "Practicante"
    - "Intern"
    - "Intendencia"
    - "Limpieza"
    - "Seguridad"
    - "Chofer"
    - "Almacén"
    - "Recepcionista"
    - "Vendedor de piso"
  seniority_boost:
    - "Senior"
    - "Sr"
    - "Lead"
    - "Head"
    - "Director"
    - "Directora"
    - "Coordinador"
    - "Coordinadora"
    - "Gerente"
    - "Jefe"
    - "Jefa"
    - "Responsable"

# -- Search queries --
# Targeting Mexican job boards and LinkedIn for design/marketing roles

search_queries:

  # -- OCC Mundial (Mexico's largest job board) --
  - name: OCC — Marketing Los Cabos
    query: 'site:occ.com.mx "marketing" OR "branding" OR "diseño" "Los Cabos" OR "BCS" OR "Baja California Sur"'
    enabled: true

  - name: OCC — Marketing Remoto México
    query: 'site:occ.com.mx "coordinador marketing" OR "brand manager" OR "estratega contenido" "remoto" OR "home office"'
    enabled: true

  - name: OCC — Diseño Gráfico Senior
    query: 'site:occ.com.mx "diseñador gráfico" OR "diseño gráfico" "senior" OR "coordinador" OR "lead"'
    enabled: true

  - name: OCC — Comunicación Interna
    query: 'site:occ.com.mx "comunicación interna" OR "endomarketing" OR "employer branding"'
    enabled: true

  # -- CompuTrabajo (LATAM) --
  - name: CompuTrabajo — Marketing México
    query: 'site:computrabajo.com.mx "marketing" OR "brand manager" OR "branding" "senior" OR "coordinador"'
    enabled: true

  - name: CompuTrabajo — Diseño México
    query: 'site:computrabajo.com.mx "diseño gráfico" OR "director creativo" OR "directora creativa" OR "contenido"'
    enabled: true

  # -- Indeed México --
  - name: Indeed — Marketing Los Cabos
    query: 'site:indeed.com.mx "marketing" OR "branding" OR "diseño" "Los Cabos"'
    enabled: true

  - name: Indeed — Marketing Remoto MX
    query: 'site:indeed.com.mx "marketing digital" OR "brand manager" OR "content strategist" "remoto" OR "home office" México'
    enabled: true

  - name: Indeed — Comunicación Interna MX
    query: 'site:indeed.com.mx "comunicación interna" OR "endomarketing" OR "employer branding" México'
    enabled: true

  # -- LinkedIn Jobs --
  - name: LinkedIn — Marketing BCS
    query: 'site:linkedin.com/jobs "marketing" OR "branding" "Los Cabos" OR "Baja California Sur"'
    enabled: true

  - name: LinkedIn — Creative Director MX
    query: 'site:linkedin.com/jobs "creative director" OR "directora creativa" OR "brand manager" México'
    enabled: true

  - name: LinkedIn — Content Strategy MX Remote
    query: 'site:linkedin.com/jobs "content strategist" OR "estratega de contenido" México remote OR remoto'
    enabled: true

  # -- Bumeran (LATAM) --
  - name: Bumeran — Marketing MX
    query: 'site:bumeran.com.mx "marketing" OR "diseño" OR "branding" "senior" OR "coordinador"'
    enabled: true

  # -- Glassdoor MX --
  - name: Glassdoor — Marketing Design MX
    query: 'site:glassdoor.com.mx "marketing manager" OR "brand manager" OR "graphic designer" México'
    enabled: true

  # -- Hospitality-specific (her industry) --
  - name: Hospitality Marketing — All boards
    query: '"marketing" OR "branding" "hotel" OR "hospitality" OR "hotelería" "Los Cabos" OR "Cancún" OR "Riviera Maya" México'
    enabled: true

  - name: Hospitality — Endomarketing
    query: '"comunicación interna" OR "endomarketing" "hotel" OR "resort" OR "hotelería" México'
    enabled: true

  # -- Remote US/International (English-language roles she can do from Mexico) --
  - name: Remote — Brand Marketing Manager
    query: '"brand manager" OR "marketing manager" remote "Latin America" OR "LATAM" OR "Mexico" OR "anywhere"'
    enabled: true

  - name: Remote — Creative Director US
    query: '"creative director" OR "art director" remote "LATAM" OR "Latin America" OR "worldwide" OR "anywhere"'
    enabled: true

  - name: Remote — Content Strategist US
    query: '"content strategist" OR "content marketing manager" remote "LATAM" OR "Mexico" OR "worldwide"'
    enabled: true

  - name: Remote — Graphic Design Lead US
    query: '"senior graphic designer" OR "design lead" OR "visual designer" remote "LATAM" OR "Latin America" OR "worldwide"'
    enabled: true

  - name: WeWorkRemotely — Marketing Design
    query: 'site:weworkremotely.com "marketing" OR "brand" OR "design" OR "creative"'
    enabled: true

  - name: RemoteOK — Marketing Design
    query: 'site:remoteok.com "marketing" OR "brand manager" OR "graphic designer" OR "content strategist"'
    enabled: true

  - name: LinkedIn Remote — Marketing LATAM
    query: 'site:linkedin.com/jobs "marketing" OR "brand manager" OR "creative director" "remote" "LATAM" OR "Latin America"'
    enabled: true

  - name: Indeed Remote — Marketing Bilingual
    query: 'site:indeed.com "marketing manager" OR "brand manager" "remote" "bilingual" OR "Spanish" OR "LATAM"'
    enabled: true

